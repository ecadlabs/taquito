name: taquito.io pages deploy

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/main' || github.run_number }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  CHATKIT_WORKFLOW_ID: ${{ secrets.CHATKIT_WORKFLOW_ID }}
jobs:
  publish-website:
    name: Publish taquito.io to Cloudflare Pages
    permissions:
      contents: read
      deployments: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Install and build all packages (required for TypeDoc)
      - name: Install root dependencies
        run: npm ci
      - name: Build packages
        run: npm run build
      # Build website
      - name: Install website dependencies
        run: npm ci
        working-directory: website
      - name: Build website
        run: npm run build
        working-directory: website
      # Build TypeDoc (after packages are built)
      - name: Build TypeDoc API docs
        run: npm run build-docs

      - name: Publish to Cloudflare Pages
        id: cloudflare_publish
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID}}
          command: pages deploy website/dist --project-name=taquito
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}


      # Notify the PR of the deploy preview
      - if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.cloudflare_publish.outputs.pages-deployment-alias-url }}
          DEPLOYMENT_URL: ${{ steps.cloudflare_publish.outputs.deployment-url }}
        run: |
          preview_url="${PREVIEW_URL:-$DEPLOYMENT_URL}"
          node scripts/upsert-pr-comment.js \
            --header "taquito.io Preview" \
            --message "A new deploy preview for taquito.io is available on Cloudflare Pages at ${preview_url}"
