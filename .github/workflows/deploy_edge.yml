name: Deploy Edge

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/main' || github.run_number }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  deploy-edge-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    if: ${{ !github.event.pull_request.head.repo.fork && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') }}
    env:
      VERDACCIO_TOKEN: ${{ secrets.EDGE_VERDACCIO_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - run: echo "PACKAGE_VERSION=`node -p "require('./packages/taquito/package.json').version"`" >> $GITHUB_ENV
      - run: echo "BRANCH_NAME=$(echo "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}" | sed 's/[^a-zA-Z0-9-]/-/g')" >> $GITHUB_ENV
      - run: echo "TARGET_VERSION=${PACKAGE_VERSION}-${SHORT_SHA}--${BRANCH_NAME}" >> $GITHUB_ENV
      - name: Verify Sapling release handoff
        run: |
          set -euo pipefail
          sapling_wasm_version=$(node -p "require('./packages/taquito-sapling/package.json').dependencies['@taquito/sapling-wasm']")
          if [ "${sapling_wasm_version}" = "0.1.1" ]; then
            echo "@taquito/sapling still depends on @taquito/sapling-wasm@0.1.1. Publish sapling-wasm 0.2.0+ and bump packages/taquito-sapling/package.json before preview publication." >&2
            exit 1
          fi
      - run: npm ci
      - run: find packages/ -mindepth 1 -maxdepth 2 -name README.md | xargs sed -i '1s/^/# WARNING This build is produced from a feature branch and could contain unreviewed changes from the public. Use with caution, do not use in production\n\n/'
      - run: node scripts/sync-workspace-deps.js "${TARGET_VERSION}"
      - run: npm run version-stamp
      - name: Select edge-published workspaces
        run: |
          set -euo pipefail
          find packages/ -mindepth 1 -maxdepth 2 -name package.json \
            | xargs -I{} node -pe "require('./{}')['name']" \
            > .edge-workspaces

          if [ ! -s .edge-workspaces ]; then
            echo "No workspaces selected for edge publishing" >&2
            exit 1
          fi

          echo "Publishing edge workspaces:"
          cat .edge-workspaces
      - run: npm run build
      - run: npm run -w @taquito/taquito build:release
      - run: echo ${VERDACCIO_TOKEN} >> ~/.npmrc
      - run: |
          set -euo pipefail
          while read -r workspace; do
            npm publish --workspace "${workspace}" --tag edge --access public --registry https://npm.preview.tezostaquito.io/
          done < .edge-workspaces
      - if: ${{ github.event_name == 'pull_request' }}
        run: |
          echo "COMMENT_BODY<<EOF"  >> $GITHUB_ENV
          echo "New packages have been deployed to the preview repository at https://npm.preview.tezostaquito.io/." >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "### Published packages:" >> $GITHUB_ENV
          echo "\`\`\`" >> $GITHUB_ENV
          while read -r workspace; do
            printf 'npm i %s@%s --registry https://npm.preview.tezostaquito.io/\n' "${workspace}" "${TARGET_VERSION}" >> $GITHUB_ENV
          done < .edge-workspaces
          echo "\`\`\`" >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV
      - if: ${{ github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node scripts/upsert-pr-comment.js \
            --header "deploy-packages" \
            --message "${COMMENT_BODY}"
