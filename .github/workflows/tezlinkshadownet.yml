name: Tezlink_Shadownet Integration Tests
on:
  push:
    branches:
      - '**tezlink**'

permissions:
  contents: read

jobs:
  integration-tests-tezlinkshadownet:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - if: always()
        id: integration-tests-tezlinkshadownet
        run: npm -w integration-tests run test:tezlinkshadownet-secret-key -- --exclude='**/sapling/**' --exclude='**/ledger/**'
