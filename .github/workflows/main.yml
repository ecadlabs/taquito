name: Node.js CI

on:
  pull_request:
    paths-ignore:
      - 'website/**'
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/master' || github.run_number }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  http-utils-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - '20'
          - '22'
          - '24'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npx nx build @taquito/http-utils
      - run: npx nx test @taquito/http-utils -- --coverage

  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 'lts/Iron'
          - 'lts/Jod'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run build-docs
      - run: npm run test -- --runInBand
      - name: Codecov
        uses: codecov/codecov-action@v3.1.1
        with:
          file: .coverage/*.json
        env:
          CI: true
          RUN_INTEGRATION: true

  integration-tests-testnet:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/Iron
          cache: npm
      - run: npm ci
      - run: npm run build
      - if: ${{ !github.event.pull_request.head.repo.fork }}
        name: Tailscale
        uses: tailscale/github-action@v1
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: 1.32.2
      - id: run-tests
        run: >
          npm -w integration-tests run test:tallinnnet
          -- --maxWorkers=2
          --shard=${{ matrix.shard }}/3
          --testPathIgnorePatterns=sapling
          --testPathIgnorePatterns=ledger
        env:
          TAQUITO_HTTP_KEEPALIVE: 'true'
          TAQUITO_ITEST_DIAGNOSTICS: 'true'
          TAQUITO_DIAG_BALANCE_WARN_MUTEZ: '9000000'
          TEZOS_RPC_TALLINNNET: ${{ github.event.pull_request.head.repo.fork && 'http://ecad-tezos-tallinnnet-rolling-1.i.ecadinfra.com/' || null }}

  integration-tests-sapling:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/Iron
          cache: npm
      - run: npm ci
      - run: npm run build
      - if: ${{ !github.event.pull_request.head.repo.fork }}
        name: Tailscale
        uses: tailscale/github-action@v1
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: 1.32.2
      - id: run-tests
        run: >
          npm -w integration-tests run test:tallinnnet
          -- --maxWorkers=1
          --testPathPattern='sapling'
        env:
          TAQUITO_HTTP_KEEPALIVE: 'true'
          TAQUITO_ITEST_DIAGNOSTICS: 'true'
          TAQUITO_DIAG_BALANCE_WARN_MUTEZ: '9000000'
          TEZOS_RPC_TALLINNNET: ${{ github.event.pull_request.head.repo.fork && 'http://ecad-tezos-tallinnnet-rolling-1.i.ecadinfra.com/' || null }}
