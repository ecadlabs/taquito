name: Node.js CI

on:
  pull_request:
    paths-ignore:
      - 'website/**'
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/master' || github.run_number }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  http-utils-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - '22'
          - '24'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npx nx build @taquito/http-utils
      - run: npx nx test @taquito/http-utils -- --coverage

  integration-tests-keygen-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keygen preflight
        run: bash .github/scripts/check-keygen-health.sh

  lint-and-test:
    name: build-lint-docs-unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 'lts/Jod'
          - '24'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run build-docs
      - run: npm run test -- --runInBand
      - name: Codecov
        uses: codecov/codecov-action@v3.1.1
        with:
          file: .coverage/*.json
        env:
          CI: true
          RUN_INTEGRATION: true

  integration-tests-testnet:
    name: integration-tests-shadownet
    needs: integration-tests-keygen-preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    concurrency:
      group: shadownet-itest-testnet-shard-${{ matrix.shard }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/Jod
          cache: npm
      - run: npm ci
      - run: npm run build
      - if: ${{ !github.event.pull_request.head.repo.fork }}
        name: Tailscale
        # Pinned to SHA to prevent supply-chain attacks via mutable tags.
        # Verify before bumping: https://github.com/tailscale/github-action/releases
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:github-runner
          ping: ecad-tezos-shadownet-rolling-1.i.ecadinfra.com
      - name: Probe keygen before shadownet tests
        shell: bash
        run: |
          set -euo pipefail
          keygen_url='http://keygen-direct.ecadinfra.com/v2/shadownet'
          payload='{"require_unrevealed":false,"key_prefixes":["tz1"],"max_selection_attempts":5,"min_balance_mutez":5000000}'
          echo "### Keygen probe before shadownet tests" >> "$GITHUB_STEP_SUMMARY"
          for i in 1 2 3 4 5; do
            line="$(
              curl -sS -o /dev/null \
                -X POST \
                -H 'Content-Type: application/json' \
                -H 'Authorization: Bearer taquito-example' \
                -d "$payload" \
                -w "probe=${i} code=%{http_code} ip=%{remote_ip} dns=%{time_namelookup} tcp=%{time_connect} tls=%{time_appconnect} ttfb=%{time_starttransfer} total=%{time_total}\\n" \
                "$keygen_url"
            )"
            echo "$line"
            echo "- $line" >> "$GITHUB_STEP_SUMMARY"
          done
      - id: run-tests
        shell: bash
        run: |
          set -euo pipefail
          start_epoch="$(date +%s)"
          start_iso="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          set +e
          npm -w integration-tests run test:shadownet:shard -- \
            --shard=$SHARD_INDEX/$SHARD_TOTAL \
            --exclude='**/sapling/**' \
            --exclude='**/ledger/**'
          test_exit_code="$?"
          set -e

          end_epoch="$(date +%s)"
          end_iso="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          elapsed_seconds="$((end_epoch - start_epoch))"

          mkdir -p ci-metrics
          cat > "ci-metrics/itest-shadownet-${SHARD_INDEX}.json" <<EOF
          {"suite":"shadownet","shard":"${SHARD_INDEX}/${SHARD_TOTAL}","status":"$([ "$test_exit_code" -eq 0 ] && echo pass || echo fail)","exit_code":$test_exit_code,"elapsed_seconds":$elapsed_seconds,"started_at":"$start_iso","completed_at":"$end_iso","run_id":"${RUN_ID}","run_attempt":"${RUN_ATTEMPT}","sha":"${COMMIT_SHA}"}
          EOF

          echo "### Integration timing: shadownet shard ${SHARD_INDEX}/${SHARD_TOTAL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- status: $([ "$test_exit_code" -eq 0 ] && echo pass || echo fail)" >> "$GITHUB_STEP_SUMMARY"
          echo "- exit_code: $test_exit_code" >> "$GITHUB_STEP_SUMMARY"
          echo "- elapsed_seconds: $elapsed_seconds" >> "$GITHUB_STEP_SUMMARY"

          exit "$test_exit_code"
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: '4'
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          COMMIT_SHA: ${{ github.sha }}
          TAQUITO_ITEST_DIAGNOSTICS: 'true'
          TAQUITO_DIAG_BALANCE_WARN_MUTEZ: '9000000'
          TAQUITO_FRESH_KEY_PREFETCH: '4'
      - name: Probe keygen after shadownet tests
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          keygen_url='http://keygen-direct.ecadinfra.com/v2/shadownet'
          payload='{"require_unrevealed":false,"key_prefixes":["tz1"],"max_selection_attempts":5,"min_balance_mutez":5000000}'
          echo "### Keygen probe after shadownet tests" >> "$GITHUB_STEP_SUMMARY"
          for i in 1 2 3 4 5; do
            line="$(
              curl -sS -o /dev/null \
                -X POST \
                -H 'Content-Type: application/json' \
                -H 'Authorization: Bearer taquito-example' \
                -d "$payload" \
                -w "probe=${i} code=%{http_code} ip=%{remote_ip} dns=%{time_namelookup} tcp=%{time_connect} tls=%{time_appconnect} ttfb=%{time_starttransfer} total=%{time_total}\\n" \
                "$keygen_url"
            )"
            echo "$line"
            echo "- $line" >> "$GITHUB_STEP_SUMMARY"
          done
      - name: Upload timing artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: itest-timing-shadownet-${{ matrix.shard }}
          path: ci-metrics/itest-shadownet-${{ matrix.shard }}.json
          if-no-files-found: warn
          retention-days: 30

  integration-tests-sapling:
    name: integration-tests-shadownet-sapling
    needs: integration-tests-keygen-preflight
    runs-on: ubuntu-latest
    concurrency:
      group: shadownet-itest-sapling
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/Jod
          cache: npm
      - run: npm ci
      - run: npm run build
      - if: ${{ !github.event.pull_request.head.repo.fork }}
        name: Tailscale
        # Pinned to SHA to prevent supply-chain attacks via mutable tags.
        # Verify before bumping: https://github.com/tailscale/github-action/releases
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:github-runner
          ping: ecad-tezos-shadownet-rolling-1.i.ecadinfra.com
      - name: Probe keygen before sapling tests
        shell: bash
        run: |
          set -euo pipefail
          keygen_url='http://keygen-direct.ecadinfra.com/v2/shadownet'
          payload='{"require_unrevealed":false,"key_prefixes":["tz1"],"max_selection_attempts":5,"min_balance_mutez":5000000}'
          echo "### Keygen probe before sapling tests" >> "$GITHUB_STEP_SUMMARY"
          for i in 1 2 3 4 5; do
            line="$(
              curl -sS -o /dev/null \
                -X POST \
                -H 'Content-Type: application/json' \
                -H 'Authorization: Bearer taquito-example' \
                -d "$payload" \
                -w "probe=${i} code=%{http_code} ip=%{remote_ip} dns=%{time_namelookup} tcp=%{time_connect} tls=%{time_appconnect} ttfb=%{time_starttransfer} total=%{time_total}\\n" \
                "$keygen_url"
            )"
            echo "$line"
            echo "- $line" >> "$GITHUB_STEP_SUMMARY"
          done
      - id: run-tests
        shell: bash
        run: |
          set -euo pipefail
          start_epoch="$(date +%s)"
          start_iso="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          set +e
          npm -w integration-tests run test:shadownet -- sapling
          test_exit_code="$?"
          set -e

          end_epoch="$(date +%s)"
          end_iso="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          elapsed_seconds="$((end_epoch - start_epoch))"

          mkdir -p ci-metrics
          cat > "ci-metrics/itest-sapling.json" <<EOF
          {"suite":"sapling","shard":"1/1","status":"$([ "$test_exit_code" -eq 0 ] && echo pass || echo fail)","exit_code":$test_exit_code,"elapsed_seconds":$elapsed_seconds,"started_at":"$start_iso","completed_at":"$end_iso","run_id":"${RUN_ID}","run_attempt":"${RUN_ATTEMPT}","sha":"${COMMIT_SHA}"}
          EOF

          echo "### Integration timing: sapling" >> "$GITHUB_STEP_SUMMARY"
          echo "- status: $([ "$test_exit_code" -eq 0 ] && echo pass || echo fail)" >> "$GITHUB_STEP_SUMMARY"
          echo "- exit_code: $test_exit_code" >> "$GITHUB_STEP_SUMMARY"
          echo "- elapsed_seconds: $elapsed_seconds" >> "$GITHUB_STEP_SUMMARY"

          exit "$test_exit_code"
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          COMMIT_SHA: ${{ github.sha }}
          TAQUITO_ITEST_DIAGNOSTICS: 'true'
          TAQUITO_DIAG_BALANCE_WARN_MUTEZ: '9000000'
          TAQUITO_FRESH_KEY_PREFETCH: '4'
      - name: Probe keygen after sapling tests
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          keygen_url='http://keygen-direct.ecadinfra.com/v2/shadownet'
          payload='{"require_unrevealed":false,"key_prefixes":["tz1"],"max_selection_attempts":5,"min_balance_mutez":5000000}'
          echo "### Keygen probe after sapling tests" >> "$GITHUB_STEP_SUMMARY"
          for i in 1 2 3 4 5; do
            line="$(
              curl -sS -o /dev/null \
                -X POST \
                -H 'Content-Type: application/json' \
                -H 'Authorization: Bearer taquito-example' \
                -d "$payload" \
                -w "probe=${i} code=%{http_code} ip=%{remote_ip} dns=%{time_namelookup} tcp=%{time_connect} tls=%{time_appconnect} ttfb=%{time_starttransfer} total=%{time_total}\\n" \
                "$keygen_url"
            )"
            echo "$line"
            echo "- $line" >> "$GITHUB_STEP_SUMMARY"
          done
      - name: Upload timing artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: itest-timing-sapling
          path: ci-metrics/itest-sapling.json
          if-no-files-found: warn
          retention-days: 30

  integration-tests-timing-summary:
    needs:
      - integration-tests-testnet
      - integration-tests-sapling
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download timing artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: itest-timing-*
          path: ci-metrics
          merge-multiple: true
      - name: Render timing summary
        shell: bash
        run: |
          set -euo pipefail

          echo "## Integration timing summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if ! ls ci-metrics/*.json >/dev/null 2>&1; then
            echo "No timing artifacts found for this run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "| suite | shard | status | elapsed_seconds | exit_code | started_at | completed_at |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---:|---|---:|---:|---|---|" >> "$GITHUB_STEP_SUMMARY"
          jq -s -r '
            sort_by(.suite, .shard)
            | .[]
            | "| \(.suite) | \(.shard) | \(.status) | \(.elapsed_seconds) | \(.exit_code) | \(.started_at) | \(.completed_at) |"
          ' ci-metrics/*.json >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Raw timing JSON artifacts are attached to this run under names matching \`itest-timing-*\`." >> "$GITHUB_STEP_SUMMARY"
